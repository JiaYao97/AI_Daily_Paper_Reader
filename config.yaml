  - tag: SFC-HTP
    description: 超声速/高超声速气膜冷却与航空航天热防护
    enabled: true
    paper_sources:
      - arxiv
    daily_paper_limit: 10
    keywords:
      - keyword: supersonic film cooling
        keyword_cn: 超声速气膜冷却
        query: supersonic film cooling for aerospace thermal protection
      - keyword: hypersonic film cooling
        keyword_cn: 高超声速气膜冷却
        query: hypersonic film cooling and active thermal protection systems
      - keyword: adiabatic film cooling effectiveness
        keyword_cn: 绝热气膜冷却效率
        query: adiabatic film cooling effectiveness prediction in compressible flows
      - keyword: film cooling effectiveness prediction
        keyword_cn: 气膜冷却效率预测
        query: data-driven prediction of film cooling effectiveness
      - keyword: coolant injection into supersonic crossflow
        keyword_cn: 超声速横流中的冷却剂喷注
        query: coolant injection into supersonic crossflow with shock boundary layer interaction
